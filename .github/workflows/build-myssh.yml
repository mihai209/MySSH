name: Build MySSH

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-myssh.yml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "wails.json"
  pull_request:
    paths:
      - ".github/workflows/build-myssh.yml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "wails.json"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum') }}-${{ hashFiles('cmd/**', 'internal/**', 'cmd/myssh/frontend/dist/**') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod', 'go.sum') }}-
            ${{ runner.os }}-go-

      - name: Install Wails build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Download modules
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath -ldflags="-s -w" -o dist/myssh ./cmd/myssh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myssh-linux-amd64
          path: dist/myssh
          if-no-files-found: error
